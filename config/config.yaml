# =====================================================================
# Configuration for the Run-3 EWK SUSY target study
# Data: ATLAS pMSSM EWK scan, arXiv:2402.01392 (SUSY-2020-15)
# =====================================================================

# Where the `download` rule fetches the input tarballs + CSVs from (ATLAS public page).
download_base_url: https://atlas.web.cern.ch/Atlas/GROUPS/PHYSICS/PAPERS/SUSY-2020-15/inputs

# Each scan ships as an SLHA tarball + an exclusion CSV (one row / model).
# The `download` rule fetches these into data/.
scans:
  EWKino:
    slha_tarball: data/EWKino_SLHA.tar.gz
    exclusion_csv: data/EWKino.csv
  Bino-DM:
    slha_tarball: data/Bino-DM_SLHA.tar.gz
    exclusion_csv: data/Bino-DM.csv

# --- Exclusion & projection -----------------------------------------
cls_threshold: 0.05         # CLs < threshold  =>  excluded at 95% CL
baseline_lumi_fb: 140.0     # Run-2 dataset used in the paper
target_lumi_fb: 450.0       # "Run 3" target = Run 2+3 combined (user choice)

projection: sqrtL           # 'sqrtL'  = statistics-limited (optimistic)
                            # 'sqrtL_syst' = reach saturates as L grows (conservative)
systematics_fraction: 0.30  # only used by 'sqrtL_syst'; fraction of the rate that is systematics-limited

# Which observed channels define the CURRENT (observed) exclusion status:
#   'all'        = all 11 observed channels (incl. DisappearingTrack/h_to_inv/mA)
#   'recastable' = only the 8 channels that also have an expected CLs
obs_exclusion_channels: all

# External-constraint flags from ATLAS (0 = excluded, 1 = not excluded):
#   Flavour : b->s gamma, Bs->mu mu, B+->tau nu
#   EW      : delta-rho, m(W), BR(Z->inv)
#   DM      : relic density AND direct detection
# A "clean/viable target" must PASS (==1) every constraint listed here, on top of not
# being excluded by ATLAS. (DM's relic-density part is cosmology-dependent; the report
# still breaks the counts down tier-by-tier so the effect of each is visible.)
require_constraints: [EW, Flavour, DM]

# The 8 EWKino searches that report an EXPECTED CLs => recastable / projectable.
projectable_analyses:
  - FullHad
  - 1Lbb
  - 2L0J
  - 2L2J
  - Compressed
  - 3LOffshell
  - 3LOnshell
  - 4L

# Observed-only channels (published limits / extra constraints).
# Used for the *current* (observed) exclusion status, NOT projected.
obs_only_analyses:
  - DisappearingTrack
  - h_to_inv
  - mA

# --- Physics-class thresholds ---------------------------------------
compressed_dm_max_gev: 35.0   # |dm(NLSP,LSP)| below this counts as "compressed"
llp_ctau_min_mm: 1.0          # chargino ctau above this => long-lived (disappearing track)
mixing_purity: 0.60           # |N|^2 fraction above which the LSP is a "pure" gaugino/higgsino
mass_Z: 91.1876
mass_h: 125.25
mass_W: 80.379

# --- Coverage holes -------------------------------------------------
# A "hole" is a viable (constraint-passing), currently-allowed, currently-INVISIBLE
# model (no expected sensitivity from the 8 searches) that a *dedicated* Run-3 search
# COULD reach -- i.e. enough EW-ino signal is produced at the target luminosity,
# N = sigma(m, mode) * target_lumi >= hole_min_run3_events. This reachability gate
# replaces a flat mass cap (winos, with larger sigma, count out to higher mass than
# higgsinos). Classes already covered by a dedicated search are excluded.
hole_expcls_min: 0.90              # min expected CLs above this = no sensitivity from the 8 searches
hole_min_run3_events: 5000         # min produced EW-ino events at target lumi to be "reachable in principle"
hole_exclude_classes:              # signatures with an existing dedicated (observed-only) search
  - LLP-disappearing-track         #   covered by the ATLAS DisappearingTrack search

# Approximate NLO+NLL EW-ino production cross-sections at sqrt(s)=13 TeV [GeV, fb]
# (LHC SUSY Cross Section WG; order-of-magnitude). Shared by the hole reachability
# gate (holes.py) and the toy sensitivity estimate (sensitivity.py).
xsec_13tev_fb:
  higgsino: [[100, 4300], [150, 1300], [200, 510], [250, 240], [300, 130],
             [400, 44], [500, 18], [700, 3.8], [1000, 0.65]]
  wino:     [[100, 13500], [150, 4000], [200, 1600], [250, 770], [300, 420],
             [400, 150], [500, 63], [700, 14], [1000, 2.6]]

# --- Toy search-sensitivity estimate (sensitivity.py) ----------------
# Illustrative cut-and-count projection of a *dedicated* soft-dilepton + ISR + MET
# search (see docs/search_design.md). NOT a detector simulation: the efficiency
# turn-on and background are parametrised (orders of magnitude anchored to the Run-2
# compressed-higgsino search, arXiv:1911.12606). All knobs live here.
sensitivity:
  # Hand-selected benchmark models to design/estimate the search for. This is an
  # INDEPENDENT study off the parsed spectra (parse_slha) -- it does NOT depend on the
  # target/hole classification. Edit the list to study other benchmarks. The three
  # defaults deliberately span the compressed landscape (light vs heavier, higgsino vs bino).
  models:
    - {scan: EWKino, model: 770}     # ~183 GeV higgsino benchmark (the worked example)
    - {scan: EWKino, model: 9030}    # ~101 GeV higgsino, very compressed (dm ~ 1.4 GeV)
    - {scan: Bino-DM, model: 3766}   # ~144 GeV compressed bino (coannihilation)

  # Signal efficiency vs splitting:  eff(dm) = eff_plateau * sigmoid((dm - eff_dm_half_gev)/eff_dm_width_gev)
  eff_plateau: 0.03          # plateau A*eps at large dm. Motivation: the Run-2 soft-dilepton + ISR
                             #   search (arXiv:1911.12606) reaches ~1-5% signal efficiency in its best
                             #   (larger-dm) regions; 3% is a representative mid-range value.
  eff_dm_half_gev: 6.0       # dm at half-plateau. Motivation: lepton pT scales ~ with dm, and the
                             #   search reconstructs leptons only down to ~3-5 GeV, so acceptance is
                             #   ~50% once dm reaches a few x that threshold (~5-10 GeV).
  eff_dm_width_gev: 3.0      # turn-on width. Motivation: the lepton-pT spectrum smears the acceptance
                             #   over a few GeV of dm rather than a sharp step.

  # Background:  B = bkg_ref_events * (target_lumi_fb / bkg_ref_lumi_fb)  -- a single flat SR yield.
  bkg_ref_events: 120.0      # reference SR background. Motivation: ORDER-OF-MAGNITUDE stand-in -- the
                             #   Run-2 soft-dilepton SRs (arXiv:1911.12606) hold O(tens-hundreds) bkg
                             #   events (fake/non-prompt leptons + WW + Z->tautau). NOT extracted from a
                             #   specific bin; this is the toy's single biggest unverified assumption.
  bkg_ref_lumi_fb: 140.0     # lumi the reference yield is quoted at (the Run-2 dataset of 1911.12606).
  bkg_syst_frac: 0.30        # fractional bkg systematic. Motivation: these SRs are limited by the
                             #   data-driven fake estimate; total background uncertainties run ~20-40%.
  excl_significance: 1.64    # expected-exclusion threshold = Phi^-1(0.95) = 1.645, the standard
                             #   one-sided 95% CL significance. This is a definition, not an assumption.
