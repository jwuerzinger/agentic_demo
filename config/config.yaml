# =====================================================================
# Configuration for the Run-3 EWK SUSY target study
# Data: ATLAS pMSSM EWK scan, arXiv:2402.01392 (SUSY-2020-15)
# =====================================================================

# Where the `download` rule fetches the input tarballs + CSVs from (ATLAS public page).
download_base_url: https://atlas.web.cern.ch/Atlas/GROUPS/PHYSICS/PAPERS/SUSY-2020-15/inputs

# Each scan ships as an SLHA tarball + an exclusion CSV (one row / model).
# The `download` rule fetches these into data/.
scans:
  EWKino:
    slha_tarball: data/EWKino_SLHA.tar.gz
    exclusion_csv: data/EWKino.csv
  Bino-DM:
    slha_tarball: data/Bino-DM_SLHA.tar.gz
    exclusion_csv: data/Bino-DM.csv

# --- Exclusion & projection -----------------------------------------
cls_threshold: 0.05         # CLs < threshold  =>  excluded at 95% CL
baseline_lumi_fb: 140.0     # Run-2 dataset used in the paper
target_lumi_fb: 450.0       # "Run 3" target = Run 2+3 combined (user choice)

projection: sqrtL           # 'sqrtL'  = statistics-limited (optimistic)
                            # 'sqrtL_syst' = reach saturates as L grows (conservative)
systematics_fraction: 0.30  # only used by 'sqrtL_syst'; fraction of the rate that is systematics-limited

# Which observed channels define the CURRENT (observed) exclusion status:
#   'all'        = all 11 observed channels (incl. DisappearingTrack/h_to_inv/mA)
#   'recastable' = only the 8 channels that also have an expected CLs
obs_exclusion_channels: all

# External-constraint flags from ATLAS (0 = excluded, 1 = not excluded):
#   Flavour : b->s gamma, Bs->mu mu, B+->tau nu
#   EW      : delta-rho, m(W), BR(Z->inv)
#   DM      : relic density AND direct detection
# A "clean/viable target" must PASS (==1) every constraint listed here, on top of not
# being excluded by ATLAS. (DM's relic-density part is cosmology-dependent; the report
# still breaks the counts down tier-by-tier so the effect of each is visible.)
require_constraints: [EW, Flavour, DM]

# The 8 EWKino searches that report an EXPECTED CLs => recastable / projectable.
projectable_analyses:
  - FullHad
  - 1Lbb
  - 2L0J
  - 2L2J
  - Compressed
  - 3LOffshell
  - 3LOnshell
  - 4L

# Observed-only channels (published limits / extra constraints).
# Used for the *current* (observed) exclusion status, NOT projected.
obs_only_analyses:
  - DisappearingTrack
  - h_to_inv
  - mA

# --- Physics-class thresholds ---------------------------------------
compressed_dm_max_gev: 35.0   # |dm(NLSP,LSP)| below this counts as "compressed"
llp_ctau_min_mm: 1.0          # chargino ctau above this => long-lived (disappearing track)
mixing_purity: 0.60           # |N|^2 fraction above which the LSP is a "pure" gaugino/higgsino
mass_Z: 91.1876
mass_h: 125.25
mass_W: 80.379

# --- Search-strategy reach tiers & coverage holes -------------------
# For each viable, currently-allowed model we ask what it would take to exclude it,
# using R_req = the improvement over the best current search needed at the target lumi
# (mu-space, mu95 ~ 1/sqrt(L); computed in project.py). The tiers (classify.py):
#   lumi         : R_req <= 1                 -> existing searches + Run-3 luminosity
#   reoptimise   : 1 < R_req <= reopt_factor  -> re-optimise an included search
#   new-strategy : R_req > reopt_factor AND a dominant signature no included search uses
#   out-of-reach : R_req > reopt_factor, no distinct alternative handle
#
# A HOLE is a *new-strategy* model that (a) is produced enough for a dedicated search
# (N = sigma(m,mode)*target_lumi >= hole_min_run3_events), and (b) is not already covered
# by an included dedicated search (hole_exclude_classes). I.e. a genuinely NEW search,
# not a re-optimisation of what the pMSSM scan already includes.
reopt_factor: 5.0              # max improvement a re-optimised included search can plausibly achieve
hole_radiative_min: 0.50      # BR(chi2 -> chi1 gamma) above this = radiative -> soft-photon handle
hole_tau_min: 0.50            # BR(chi1+ -> chi1 tau nu) above this = tau-rich -> tau handle
hole_min_run3_events: 5000    # production floor (sigma*L) for "reachable in principle" by a dedicated search
hole_exclude_classes:         # signatures with an existing dedicated search
  - LLP-disappearing-track    #   covered by the ATLAS DisappearingTrack search
# Soft-photon reconstructability floor. The radiative decay photon carries rest-frame energy
# E_gamma ~ dm(chi2,chi1); below ~ this the photon is too soft to reconstruct/ID even for a
# dedicated low-E_T (converted-photon) search, so those ultra-compressed holes are likely beyond
# the proposed soft-photon search too (lepton-blind AND photon-blind). Used by report.py /
# sensitivity.py only to FLAG photon-reachability -- it does NOT change the hole definition.
photon_recon_dm_min_gev: 3.0

# Approximate NLO+NLL EW-ino production cross-sections at sqrt(s)=13 TeV [GeV, fb]
# (LHC SUSY Cross Section WG; order-of-magnitude). Shared by the hole reachability
# gate (holes.py) and the toy sensitivity estimate (sensitivity.py).
xsec_13tev_fb:
  higgsino: [[100, 4300], [150, 1300], [200, 510], [250, 240], [300, 130],
             [400, 44], [500, 18], [700, 3.8], [1000, 0.65]]
  wino:     [[100, 13500], [150, 4000], [200, 1600], [250, 770], [300, 420],
             [400, 150], [500, 63], [700, 14], [1000, 2.6]]

# --- Search-sensitivity estimate (sensitivity.py) --------------------
# For hand-selected benchmarks: how much BETTER than the best CURRENT search a dedicated
# analysis would have to be to exclude the model at the target luminosity. It is
# data-anchored (baseline = the real per-model expected CLs, min over the 8 searches) and
# works in signal-strength space, where the expected 95% CL upper limit scales as
#     mu95(L) = mu95(L0) * sqrt(L0 / L)      (the physically correct, monotonic scaling)
# -- NOT the sqrt-L significance heuristic in project.py, which is only valid near the
# exclusion boundary (ExpCLs <~ 0.5) and misbehaves for far-from-reach models (see the
# caveat there). The required improvement factor is R_req = mu95(target): R_req <= 1 means
# luminosity alone suffices. IMPORTANT: R_req is anchored to the best CURRENT search, which for
# these compressed models is the soft-LEPTON search -- it uses NONE of the radiative photon. So
# R_req measures the improvement needed FROM THE LEPTON CHANNEL; it cannot credit a new photon
# channel. R_req <= assumed_improvement => reachable by re-optimising that lepton search; a larger
# R_req on a radiative model => needs the NEW (soft-photon) channel, whose gain this metric does
# not estimate (that needs simulation). Independent of the target/hole classification. NOT a sim.
sensitivity:
  # Hand-selected benchmarks spanning the spectrum: reachable-by-reopt -> needs-new-channel.
  models:
    - {scan: EWKino, model: 770}     # radiative HOLE, R_req~8.7  -> needs the photon channel (worked example)
    - {scan: EWKino, model: 9030}    # radiative HOLE, R_req~12.8 -> very compressed (dm~1.4), deeper
    - {scan: EWKino, model: 9025}    # radiative REOPTIMISE, R_req~1.8 -> reachable by lepton re-optimisation
    - {scan: Bino-DM, model: 3115}   # radiative HOLE, R_req~7.5  -> photon-dominated bino (dm~1.0), cross-scan
  assumed_improvement: 3.0   # gain a re-optimised LEPTON-channel search is ASSUMED to achieve over the best
                             #   current search (lower soft-lepton thresholds + multivariate selection).
                             #   DECOUPLED from `reopt_factor` (the population-level tiering ceiling, 5.0):
                             #   this is the benchmark-study verdict knob. A realistic lepton re-opt is ~2-3x.
                             #   reach_reopt iff R_req <= this; R_req above it on a radiative model => the
                             #   photon channel is the (unmodelled) lever, NOT "unreachable".
